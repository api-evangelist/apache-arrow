aid: apache-arrow
name: Apache Arrow
description: >-
  Apache Arrow is a cross-language development platform for in-memory data that specifies a standardized language-independent columnar memory format. It provides computational libraries and zero-copy streaming messaging and interprocess communication through the Flight RPC framework.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
