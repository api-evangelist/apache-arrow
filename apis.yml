specificationVersion: '0.19'
apis:
  - aid: apache-arrow:apache-arrow-flight-rpc
    name: Apache Arrow Flight RPC
    description: >-
      Arrow Flight is a high-performance RPC framework built on gRPC for transferring large datasets using the Arrow columnar format, with client libraries in C++, Java, Python, R, Go, and Rust.
    humanURL: https://arrow.apache.org/docs/format/Flight.html
    tags:
      - RPC
      - Data Transfer
      - gRPC
    properties:
      - type: Documentation
        url: https://arrow.apache.org/docs/format/Flight.html
  - aid: apache-arrow:apache-arrow-libraries
    name: Apache Arrow Libraries
    description: >-
      Arrow provides native libraries in C++, Java, Python (PyArrow), R, Go, Rust, JavaScript, C#, Ruby, and Julia for reading, writing, and processing columnar data in the Arrow format.
    humanURL: https://arrow.apache.org/docs/
    tags:
