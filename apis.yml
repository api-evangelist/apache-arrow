apis:
  - aid: apache-arrow:apache-arrow-flight-rpc
    name: Apache Arrow Flight RPC
    description: >-
      Arrow Flight is a high-performance RPC framework built on gRPC for transferring large datasets using the Arrow columnar format. It enables efficient bulk data transport between services with client libraries available in C++, Java, Python, R, Go, and Rust. Flight SQL extends Flight with a SQL-over-Arrow interface for database query execution.
    humanURL: https://arrow.apache.org/docs/format/Flight.html
    tags:
      - Data Transfer
      - gRPC
      - RPC
    properties:
      - type: Documentation
        url: https://arrow.apache.org/docs/format/Flight.html
      - type: APIReference
        url: https://arrow.apache.org/docs/format/FlightSql.html
  - aid: apache-arrow:apache-arrow-libraries
    name: Apache Arrow Libraries
    description: >-
      Arrow provides native libraries in C++, Java, Python (PyArrow), R, Go, Rust, JavaScript, C#, Ruby, Julia, and Swift for reading, writing, and processing columnar data in the Arrow in-memory format. Libraries enable zero-copy data sharing between processes and language runtimes.
    humanURL: https://arrow.apache.org/docs/
    tags:
      - Data Processing
      - Libraries
      - SDK
    properties:
      - type: Documentation
        url: https://arrow.apache.org/docs/
      - type: APIReference
        url: https://arrow.apache.org/docs/python/api.html
  - aid: apache-arrow:apache-arrow-format
    name: Apache Arrow Format Specification
    description: >-
      The Apache Arrow columnar format specification defines the binary layout for in-memory columnar data, including the IPC format for streaming and file-based data exchange. It covers flat arrays, nested structures, dictionaries, and extension types.
    humanURL: https://arrow.apache.org/docs/format/Columnar.html
    tags:
      - Format
      - IPC
      - Specification
    properties:
      - type: Documentation
        url: https://arrow.apache.org/docs/format/Columnar.html
      - type: Specification
        url: https://arrow.apache.org/docs/format/Versioning.html
